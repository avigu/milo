<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Riddle</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #333; }
        .riddle { font-size: 1.2rem; margin: 1.5rem 0; color: #555; line-height: 1.6; }
        .answer { display: none; color: #2a9d8f; font-weight: bold; margin-top: 1rem; }
        button {
            background-color: #2a9d8f;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #21867a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐾 Daily Riddle</h1>
        <div class="riddle">{{ riddle.riddle }}</div>
        <button onclick="document.getElementById('answer').style.display='block'">Show Answer</button>
        <div id="answer" class="answer">{{ riddle.answer }}</div>
    </div>
</body>
</html>
